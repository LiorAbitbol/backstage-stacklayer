# helm search repo backstage/backstage
# 2.6.3
backstage:
  image:
    registry: ghcr.io
    repository: liorabitbol/backstage-stacklayer
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - ghcr-pull-secret

  command:
    - "node"
    - "packages/backend"
    - "--config"
    - "app-config.yaml"
    - "--config"
    - "app-config.production.yaml"

  extraEnvVars:
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: GITHUB_TOKEN
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-secrets
          key: BACKEND_SECRET

postgresql:
  enabled: true
  auth:
    username: backstage
    database: backstage
    existingSecret: backstage-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
  host: backstage.stacklayer.local
  tls:
    enabled: true
    secretName: backstage-tls
